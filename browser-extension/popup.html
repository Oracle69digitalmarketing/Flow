<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 250px;
      padding: 20px;
      font-family: 'Inter', sans-serif;
      background: #f9fafb;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: #4f46e5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }
    .status {
      padding: 12px;
      background: white;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      font-size: 13px;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      margin-right: 6px;
    }
    .footer {
      margin-top: 20px;
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <img 
      src="https://storage.googleapis.com/static-content-ais-prod/user_content/rlp4mi36mfpglv35hnby4z/62/logo.png" 
      alt="Flow Logo" 
      style="height: 32px; width: auto;"
    />
  </div>
  <div class="status">
    <span class="status-dot"></span>
    Connected to Mission Control
  </div>
  <div class="footer">
    v1.0.0 • FLOW AI Sales Assistant
  </div>
</body>
</html>
