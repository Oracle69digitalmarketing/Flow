<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    h2 {
      margin: 0;
      color: #1a1a1a;
      font-size: 18px;
      border-bottom: 1px solid #eaeaea;
      padding-bottom: 8px;
    }
    .status {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
    }
    .competitor-badge {
      background: #ffebee;
      color: #c62828;
      padding: 8px;
      border-radius: 4px;
      font-weight: 500;
    }
    button {
      background: #4a90e2;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }
    button:hover {
      background: #357abd;
    }
    .insights {
      background: #e3f2fd;
      padding: 12px;
      border-radius: 8px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Flow Assistant</h2>
    
    <div id="currentPage" class="status">
      Loading page info...
    </div>
    
    <div id="competitorAlert" style="display: none;" class="competitor-badge">
      ⚠️ Competitor website detected
    </div>
    
    <div id="insights" style="display: none;" class="insights">
      <strong>Flow Insights:</strong>
      <p id="insightText"></p>
    </div>
    
    <button id="askFlowBtn">Ask Flow about this page</button>
    <button id="generateBattlecard">Generate Battlecard</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
